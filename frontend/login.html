<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ReadyRoad - Login</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        /* ===== PAGE LAYOUT ===== */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== CONTAINER ===== */
        .container {
            background: #ffffff;
            padding: 30px 35px;
            width: 100%;
            max-width: 420px;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        /* ===== HEADINGS ===== */
        h1 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 5px;
        }

        h2 {
            text-align: center;
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }

        hr {
            margin-bottom: 20px;
            border: none;
            height: 1px;
            background: #ddd;
        }

        /* ===== FORM ===== */
        form {
            width: 100%;
        }

        /* ===== INPUTS ===== */
        form div {
            margin-bottom: 12px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 5px rgba(37, 99, 235, 0.4);
        }

        /* ===== BUTTON ===== */
        button {
            width: 100%;
            padding: 12px;
            background: #1e3c72;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2a5298;
            transform: translateY(-1px);
        }

        /* ===== TEXT & LINKS ===== */
        p {
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
            color: #333;
        }

        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>ReadyRoad Car Rental</h1>
        <h2>Login to Your Account</h2>
        <hr>

        <form id="loginForm">
            <div>
                <input type="email" name="email" placeholder="Email" required>
            </div><br>
            <div>
                <input type="password" name="password" placeholder="Password" required>
            </div><br>

            <button type="submit">Login</button>
        </form>

        <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevents page refresh

            const formData = new FormData(loginForm);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    // 1. Save the Digital Key (Token) and User ID
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('userId', result.user.id);
                    localStorage.setItem('userName', result.user.name);
                    localStorage.setItem('role', result.user.role);

                    if (result.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }

                    alert("Login Successful! Welcome " + result.user.name);

                    // 2. Redirect to the cars browsing page
                    window.location.href = 'index.html';
                } else {
                    alert("Login Failed: " + (result.msg || "Invalid Credentials"));
                }

            } catch (error) {
                console.error("Login Error:", error);
                alert("Connection error. Is your backend server running?");
            }
        });
    </script>
</body>

</html>
