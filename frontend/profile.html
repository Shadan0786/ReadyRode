<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | ReadyRoad</title>
    <style>
        /* CSS Matched with Index.html Theme */
        :root {
            --navy: #111827;
            --amber: #fbbf24;
            --white: #ffffff;
            --gray: #f9fafb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background-color: var(--gray);
            color: var(--navy);
        }

        /* Navbar Styling */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--navy);
            padding: 15px 8%;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        nav strong {
            font-size: 24px;
            color: var(--amber);
            cursor: pointer;
        }

        .nav-links a {
            color: #d1d5db;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--amber);
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 24px;
            border-left: 5px solid var(--amber);
            padding-left: 15px;
        }

        /* User Info Card */
        .profile-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: var(--amber);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: var(--navy);
        }

        .user-details p {
            margin-bottom: 5px;
            font-size: 16px;
        }

        /* Table Styling */
        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f3f4f6;
            padding: 15px;
            text-align: left;
            font-size: 13px;
            color: #6b7280;
            text-transform: uppercase;
        }

        td {
            padding: 18px 15px;
            border-bottom: 1px solid #edf2f7;
            font-size: 15px;
        }

        .status-badge {
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }

        .status-confirmed {
            background: #dcfce7;
            color: #166534;
        }

        .status-pending {
            background: #fef9c3;
            color: #854d0e;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: 0.3s;
        }

        .cancel-btn:hover {
            background: #ef4444;
            color: white;
        }
    </style>
</head>

<body>

    <nav>
        <strong onclick="window.location.href='index.html'">ReadyRide</strong>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h2>Account Overview</h2>
        <div class="profile-card">
            <div class="avatar" id="userInitial">U</div>
            <div class="user-details" id="userFields">
                <p>Loading profile...</p>
            </div>
        </div>

        <h2>My Rental History</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Car Model</th>
                        <th>Rental Period</th>
                        <th>Total Price</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="bookingList">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');
        const userName = localStorage.getItem('userName');

        if (!token) {
            alert("Please login to view profile");
            window.location.href = 'login.html';
        }

        // Setup Profile Header
        document.getElementById('userInitial').innerText = userName ? userName.charAt(0).toUpperCase() : 'U';
        document.getElementById('userFields').innerHTML = `
            <h3 style="font-size: 22px; margin-bottom: 5px;">${userName || 'Valued Client'}</h3>
            <p style="color: #6b7280;">Member ID: ${userId}</p>
        `;

        async function getMyBookings() {
            try {
                const response = await fetch(`http://localhost:5000/api/bookings/user/${userId}`, {
                    headers: { 'x-auth-token': token }
                });

                const bookings = await response.json();
                const list = document.getElementById('bookingList');
                list.innerHTML = '';

                bookings.forEach(b => {
                    const start = new Date(b.startDate).toLocaleDateString();
                    const end = new Date(b.endDate).toLocaleDateString();
                    const carInfo = b.car ? `<strong>${b.car.make}</strong> ${b.car.model}` : 'Vehicle Removed';

                    list.innerHTML += `
                <tr>
                    <td>${carInfo}</td>
                    <td>${start} - ${end}</td>
                    <td><strong>$${b.totalPrice}</strong></td>
                    <td><span class="status-badge status-confirmed">${b.status || 'Confirmed'}</span></td>
                    <td>
                        <button class="cancel-btn" onclick="cancelBooking('${b._id}')">Cancel</button>
                    </td>
                </tr>
            `;
                });
            } catch (err) {
                console.error(err);
            }
        }

        // Cancellation Logic
        async function cancelBooking(bookingId) {
            if (confirm("Are you sure you want to cancel this booking?")) {
                try {
                    const res = await fetch(`http://localhost:5000/api/bookings/${bookingId}`, {
                        method: 'DELETE',
                        headers: { 'x-auth-token': token }
                    });

                    if (res.ok) {
                        alert("Booking cancelled successfully.");
                        getMyBookings(); // List refresh karein
                    } else {
                        alert("Could not cancel booking.");
                    }
                } catch (err) {
                    alert("Error connecting to server.");
                }
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        getMyBookings();
    </script>
</body>

</html>
