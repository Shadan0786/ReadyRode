<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ReadyRoad - Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", Tahoma, sans-serif; }
        body { min-height: 100vh; background: linear-gradient(135deg, #1e3c72, #2a5298); display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: #ffffff; padding: 30px 35px; width: 100%; max-width: 450px; border-radius: 10px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2); }
        h1 { text-align: center; color: #1e3c72; margin-bottom: 5px; font-size: 24px; }
        h2 { text-align: center; color: #666; font-size: 16px; margin-bottom: 15px; }
        hr { margin-bottom: 20px; border: none; height: 1px; background: #ddd; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; outline: none; transition: 0.3s; }
        input:focus { border-color: #2a5298; box-shadow: 0 0 5px rgba(42, 82, 152, 0.4); }
        button { width: 100%; padding: 12px; background: #1e3c72; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #2a5298; transform: translateY(-1px); }
        .footer-text { text-align: center; margin-top: 20px; font-size: 14px; color: #444; }
        a { color: #2477d6; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ReadyRoad Car Rental</h1>
        <h2>Create Your Account</h2>
        <hr>

        <form id="signupForm">
            <div class="form-group">
                <input type="text" name="firstName" placeholder="First Name" required>
            </div>
            <div class="form-group">
                <input type="text" name="lastName" placeholder="Last Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password (min 8 characters)" minlength="8" required>
            </div>
            <div class="form-group">
                <input type="text" name="phoneNumber" placeholder="Phone Number" required>
            </div>
            <div class="form-group">
                <input type="text" name="driversLicense" placeholder="Driver's License Number" required>
            </div>

            <button type="submit" id="submitBtn">Register Now</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const submitBtn = document.getElementById('submitBtn');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Disable button to prevent multiple clicks
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            const formData = new FormData(signupForm);
            const userData = Object.fromEntries(formData);

            console.log("Attempting to Register:", userData);

            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                if (response.ok) {
                    alert("Account created successfully! Redirecting to login...");
                    window.location.href = 'login.html';
                } else {
                    alert("Registration Failed: " + (result.msg || result.error || "Unknown Error"));
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Register Now";
                }

            } catch (error) {
                console.error("Signup Error:", error);
                alert("Cannot connect to server. Is the backend running on port 5000?");
                submitBtn.disabled = false;
                submitBtn.innerText = "Register Now";
            }
        });
    </script>
</body>
</html>
