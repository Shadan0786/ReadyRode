<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ReadyRoad Admin - Control Tower</title>
    <style>
        /* CSS remains the same as your original provided code */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background-color: #f4f6f8;
            color: #333;
            padding: 20px;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1f2937;
            padding: 12px 20px;
            color: #fff;
            border-radius: 8px;
        }

        nav a {
            color: #9ca3af;
            text-decoration: none;
            margin-left: 15px;
        }

        nav button {
            background-color: #ef4444;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 5px;
            cursor: pointer;
        }

        section {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        form input,
        form select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        form button {
            background-color: #2563eb;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        td button {
            background-color: #ef4444;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <nav>
        <strong>ReadyRoad ADMIN</strong>
        <div>
            <a href="index.html">Home</a>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <h1>Admin Dashboard</h1>

    <section>
        <h3>+ Add New Vehicle to Fleet</h3>
        <form id="addCarForm">
            <input type="text" name="make" placeholder="Make (e.g., Tesla)" required>
            <input type="text" name="model" placeholder="Model (e.g., Model 3)" required>
            <input type="number" name="year" placeholder="Year" required>
            <input type="number" name="pricePerDay" placeholder="Price Per Day ($)" required>
            <input type="text" name="licensePlate" placeholder="License Plate" required>
            <input type="text" name="image" placeholder="Car Image URL" required>
            <select name="category">
                <option value="Economy">Economy</option>
                <option value="Luxury">Luxury</option>
                <option value="SUV">SUV</option>
            </select>
            <button type="submit">Add Car to Fleet</button>
        </form>
    </section>

    <section>
        <h3>Current Fleet</h3>
        <table>
            <thead>
                <tr>
                    <th>Car</th>
                    <th>Price/Day</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="fleetTable"></tbody>
        </table>
    </section>

    <section>
        <h3>All Customer Bookings</h3>
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Car</th>
                    <th>Dates</th>
                    <th>Revenue</th>
                </tr>
            </thead>
            <tbody id="allBookingsTable"></tbody>
        </table>
    </section>

    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');

        // Combined Security Check
        if (!token || role !== 'admin') {
            alert("Access Denied: Admins Only!");
            window.location.href = 'login.html';
        }

        async function loadFleet() {
            const res = await fetch('http://localhost:5000/api/cars');
            const cars = await res.json();
            document.getElementById('fleetTable').innerHTML = cars.map(car => `
                <tr>
                    <td>${car.make} ${car.model}</td>
                    <td>$${car.pricePerDay}</td>
                    <td>${car.status}</td>
                    <td><button onclick="deleteCar('${car._id}')">Remove</button></td>
                </tr>
            `).join('');
        }

        async function loadAllBookings() {
            try {
                const res = await fetch('http://localhost:5000/api/bookings/admin/all', {
                    headers: { 'x-auth-token': token }
                });

                const bookings = await res.json();
                const tableBody = document.getElementById('allBookingsTable');

                if (!bookings || bookings.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No bookings found.</td></tr>';
                    return;
                }

                tableBody.innerHTML = bookings.map(b => {
                    // Safety Check: Agar user ya car database se delete ho chuka ho
                    const userName = b.user ? `${b.user.firstName} ${b.user.lastName}` : '<span style="color:red">Deleted User</span>';
                    const carName = b.car ? `${b.car.make} ${b.car.model}` : '<span style="color:red">Car Removed</span>';
                    const revenue = b.totalPrice ? `$${b.totalPrice}` : '$0';

                    const startDate = b.startDate ? new Date(b.startDate).toLocaleDateString() : 'N/A';
                    const endDate = b.endDate ? new Date(b.endDate).toLocaleDateString() : 'N/A';

                    return `
                <tr>
                    <td>${userName}</td>
                    <td>${carName}</td>
                    <td>${startDate} - ${endDate}</td>
                    <td>${revenue}</td>
                </tr>
            `;
                }).join('');
            } catch (err) {
                console.error("Error loading bookings:", err);
                document.getElementById('allBookingsTable').innerHTML = '<tr><td colspan="4" style="color:red; text-align:center;">Failed to load bookings. Check Console.</td></tr>';
            }
        }

        document.getElementById('addCarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            const res = await fetch('http://localhost:5000/api/cars/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                alert("Car added!");
                e.target.reset();
                loadFleet();
            }
        });

        async function deleteCar(id) {
            if (confirm("Are you sure?")) {
                await fetch(`http://localhost:5000/api/cars/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-auth-token': token }
                });
                loadFleet();
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Initialization
        loadFleet();
        loadAllBookings();
    </script>
</body>

</html>
