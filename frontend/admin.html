<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ReadyRoad Admin - Control Tower</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            background-color: #f4f6f8;
            color: #333;
            padding: 20px;
        }

        /* ===== NAVBAR ===== */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1f2937;
            padding: 12px 20px;
            color: #fff;
            border-radius: 8px;
        }

        nav a {
            color: #9ca3af;
            text-decoration: none;
            margin-left: 15px;
        }

        nav a:hover {
            color: #fff;
        }

        nav button {
            background-color: #ef4444;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 5px;
            cursor: pointer;
        }

        nav button:hover {
            background-color: #dc2626;
        }

        /* ===== HEADINGS ===== */
        h1 {
            margin: 20px 0;
        }

        h3 {
            margin-bottom: 10px;
        }

        /* ===== SECTIONS ===== */
        section {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        /* ===== FORM ===== */
        form input,
        form select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        form button {
            background-color: #2563eb;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
        }

        form button:hover {
            background-color: #1e40af;
        }

        /* ===== TABLES ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        thead {
            background-color: #e5e7eb;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f9fafb;
        }

        /* ===== ACTION BUTTONS ===== */
        td button {
            background-color: #ef4444;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        td button:hover {
            background-color: #dc2626;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <nav>
        <strong>ReadyRoad ADMIN</strong>
        <a href="index.html">Home </a>
        <button onclick="logout()">Logout</button>
    </nav>
    <hr>

    <h1>Admin Dashboard</h1>

    <section style="background-color: #f9f9f9; padding: 15px; border: 1px solid #ccc;">
        <h3>+ Add New Vehicle to Fleet</h3>
        <form id="addCarForm">
            <input type="text" name="make" placeholder="Make (e.g., Tesla)" required><br>
            <input type="text" name="model" placeholder="Model (e.g., Model 3)" required><br>
            <input type="number" name="year" placeholder="Year" required><br>
            <input type="number" name="pricePerDay" placeholder="Price Per Day ($)" required><br>

            <input type="text" name="licensePlate" placeholder="License Plate (e.g., ABC-1234)" required><br>
            <input type="text" name="image" placeholder="Car Image URL (e.g. https://...)" required><br>

            <select name="category">
                <option value="Economy">Economy</option>
                <option value="Luxury">Luxury</option>
                <option value="SUV">SUV</option>
            </select><br>

            <button type="submit">Add Car to Fleet</button>
        </form>
    </section>

    <hr>

    <section>
        <h3>Current Fleet</h3>
        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>Car</th>
                    <th>Price/Day</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="fleetTable"></tbody>
        </table>
    </section>

    <hr>

    <section>
        <h3>All Customer Bookings</h3>
        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>User ID</th>
                    <th>Car</th>
                    <th>Dates</th>
                    <th>Revenue</th>
                </tr>
            </thead>
            <tbody id="allBookingsTable"></tbody>
        </table>
    </section>

    <script>

        (function checkAdmin() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role'); // We need to save this during login!

            if (!token || role !== 'admin') {
                alert("Access Denied: Admins Only!");
                window.location.href = 'index.html';
            }
        })();
        const token = localStorage.getItem('token');

        // Security Check: Redirect if no token
        if (!token) window.location.href = 'login.html';

        // 1. Fetch Fleet
        async function loadFleet() {
            const res = await fetch('http://localhost:5000/api/cars');
            const cars = await res.json();
            const table = document.getElementById('fleetTable');
            table.innerHTML = cars.map(car => `
                <tr>
                    <td>${car.make} ${car.model}</td>
                    <td>$${car.pricePerDay}</td>
                    <td>${car.status}</td>
                    <td><button onclick="deleteCar('${car._id}')">Remove</button></td>
                </tr>
            `).join('');
        }

        // 2. Fetch All Bookings
        async function loadAllBookings() {
            const res = await fetch('http://localhost:5000/api/bookings/admin/all', {
                headers: { 'x-auth-token': token }
            });
            const bookings = await res.json();
            const table = document.getElementById('allBookingsTable');
            table.innerHTML = bookings.map(b => `
                <tr>
                    <td>${b.user.firstName} ${b.user.lastName}</td>
                    <td>${b.car.make} ${b.car.model}</td>
                    <td>${new Date(b.startDate).toLocaleDateString()} - ${new Date(b.endDate).toLocaleDateString()}</td>
                    <td>$${b.totalPrice}</td>
                </tr>
            `).join('');
        }

        // 3. Add Car Logic
        document.getElementById('addCarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            const res = await fetch('http://localhost:5000/api/cars/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-auth-token': token
                },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                alert("Car added!");
                loadFleet();
            }
        });

        // 4. Delete Car Logic
        async function deleteCar(id) {
            if (confirm("Are you sure you want to remove this car?")) {
                await fetch(`http://localhost:5000/api/cars/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-auth-token': token }
                });
                loadFleet();
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Run on load
        loadFleet();
        loadAllBookings();
    </script>
</body>

</html>
